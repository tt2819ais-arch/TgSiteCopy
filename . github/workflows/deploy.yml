name: Build and Deploy Nyxgram

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm install

      - name: Create uploads dir
        working-directory: ./backend
        run: mkdir -p uploads

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            TARGET="/www/xn--b1aabj7ba1a8a.xn--p1ai/Tg"
            REPO_DIR="$HOME/TgSiteCopy"

            # PM2
            if ! command -v pm2 &> /dev/null; then
              npm install -g pm2
            fi

            # Клонировать или обновить репозиторий в домашнюю папку
            if [ -d "$REPO_DIR/.git" ]; then
              cd $REPO_DIR && git pull origin main
            else
              git clone https://github.com/tt2819ais-arch/TgSiteCopy.git $REPO_DIR
            fi

            # Backend deps
            cd $REPO_DIR/backend
            npm install --production
            mkdir -p uploads

            # .env
            if [ ! -f ".env" ]; then
              cat > .env << 'ENVEOF'
NODE_ENV=production
PORT=4000
HOST=127.0.0.1
JWT_ACCESS_EXPIRES=15m
JWT_REFRESH_EXPIRES=7d
ADMIN_USERNAME=MaksimXyila
ADMIN_PASSWORD=@MaksimXyila
UPLOAD_DIR=./uploads
MAX_FILE_SIZE=52428800
ENVEOF
            fi

            # Frontend build
            cd $REPO_DIR/frontend
            npm install
            npm run build

            # Копировать dist во фронтенд папку сайта
            mkdir -p $TARGET
            cp -r $REPO_DIR/frontend/dist/. $TARGET/

            # Запуск/перезапуск backend
            cd $REPO_DIR/backend
            if pm2 describe nyxgram-backend > /dev/null 2>&1; then
              pm2 restart nyxgram-backend
            else
              npm install -g tsx
              pm2 start npx --name nyxgram-backend -- tsx src/index.ts
            fi
            pm2 save

            echo "Deploy complete!"

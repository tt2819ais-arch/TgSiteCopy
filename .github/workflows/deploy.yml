name: Build and Deploy Nyxgram

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm install

      - name: Create uploads dir
        working-directory: ./backend
        run: mkdir -p uploads

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          script: >-
            REPO_DIR="$HOME/TgSiteCopy" &&
            TARGET="/www/xn--b1aabj7ba1a8a.xn--p1ai/Tg" &&
            command -v pm2 || npm install -g pm2 &&
            ([ -d "$REPO_DIR/.git" ] && cd $REPO_DIR && git pull origin main || git clone https://github.com/tt2819ais-arch/TgSiteCopy.git $REPO_DIR) &&
            cd $REPO_DIR/backend && npm install --production && mkdir -p uploads &&
            cd $REPO_DIR/frontend && npm install && npm run build &&
            cp -r $REPO_DIR/frontend/dist/. $TARGET/ &&
            cd $REPO_DIR/backend &&
            (pm2 describe nyxgram-backend > /dev/null 2>&1 && pm2 restart nyxgram-backend || (npm install -g tsx && pm2 start npx --name nyxgram-backend -- tsx src/index.ts)) &&
            pm2 save &&
            echo "Deploy complete!"
